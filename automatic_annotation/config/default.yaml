automatic_annotation_node:
  ros__parameters:
    point_cloud_type: 0
    target_accumulate_pc_num: 10
    publish_accumulated_pc: false
    origin_point_cloud_topic: "livox/pointcloud"
    undistorted_point_cloud_topic: "lio/undistort_pc"
    accumulate_pc_save_folder: "lidar_point_cloud_0"
    raw_deskew_mode: "accurate"
    raw_deskew_fixed_frame: "ins_map"
    raw_deskew_reference_time: "header_stamp"
    raw_deskew_timestamp_unit_sec: 1.0e-9
    raw_deskew_timestamp_polarity: "from_scan_start"
    raw_deskew_bucket_count_fast: 10
    raw_deskew_bucket_count_accurate: 50
    raw_deskew_publish_debug_cloud: false
    raw_deskew_save_debug_cloud: false
    raw_deskew_save_folder: "lidar_point_cloud_deskewed_0"
    raw_deskew_min_valid_ratio: 0.9
    raw_deskew_pose_source: "ins_odom"
    raw_deskew_pose_topic: "/novatel/oem7/ins_odom"
    raw_deskew_missing_pose_policy: "fallback_fast"
    raw_deskew_pose_cache_duration_sec: 30.0
    # accumulate_pc_save_folder: "samples/LIDAR_TOP"

    image_source_type: 1
    image_save_interval: 1
    left_image_topic: "camera/left/image"
    right_image_topic: "camera/right/image"
    left_camera_intrinsic_topic: "camera/left/intrinsic_matrix"
    right_camera_intrinsic_topic: "camera/right/intrinsic_matrix"
    left_camera_fig_save_folder: "camera_image_0"
    # left_camera_fig_save_folder: "samples/CAM_FRONT_LEFT"
    right_camera_fig_save_folder: "cam1"

    auto_annotation: true
    save_raw_image: true
    save_synced_pcd: true
    generate_depth_map: true
    generate_semantic_mask: false
    generate_kitti_label: true
    generate_nusc_label: false
    generate_xtreme1_json: true
    enable_visual_verify: true
    global_pc_map_addr: "/home/keyaoli/Data/AutoAnnotation/MapAnnotation/xx_20260324/velodyne_points/data/colored_lidar_merged.pcd"
    pc_annotation_file_addr: "/home/keyaoli/Data/AutoAnnotation/MapAnnotation/xx_20260324/tracklet_labels.xml"

    custom_record_folder_name: ""   # 为了自动化脚本可以传入scene标识

    tf_wait_timeout_sec: 2.0
